<h2 class="f-w-500 m-b-24" mat-dialog-title><strong>{{ action }} Plan</strong></h2>

<mat-dialog-content style="min-width: 560px">
  <form #planForm="ngForm">
    <div class="row">
      <div class="col-lg-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Plan Name</mat-label>
          <input type="text" matInput required name="name" [(ngModel)]="local_data.name" />
        </mat-form-field>
      </div>
      <div class="col-lg-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Code</mat-label>
          <input
            type="text"
            matInput
            required
            name="code"
            [(ngModel)]="local_data.code"
            [disabled]="action === 'Update'"
          />
          @if (action === 'Update') {
            <mat-hint>Code cannot be changed after creation.</mat-hint>
          }
        </mat-form-field>
      </div>
      <div class="col-lg-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Price</mat-label>
          <input
            type="number"
            matInput
            required
            min="0"
            name="price"
            [(ngModel)]="local_data.price"
          />
          <span matTextPrefix>$&nbsp;</span>
        </mat-form-field>
      </div>
      <div class="col-lg-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Status</mat-label>
          <mat-select required name="status" [(ngModel)]="local_data.status">
            @for (opt of statusOptions; track opt) {
              <mat-option [value]="opt">{{ opt }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
      </div>
      <div class="col-lg-12">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Description</mat-label>
          <textarea matInput rows="3" name="description" [(ngModel)]="local_data.description"></textarea>
        </mat-form-field>
      </div>
    </div>
    <div class="d-flex gap-16 m-t-8">
      <button mat-flat-button color="primary" [disabled]="!planForm.valid" (click)="doAction()">
        {{ action }}
      </button>
      <button mat-stroked-button color="warn" (click)="closeDialog()">Cancel</button>
    </div>
  </form>
</mat-dialog-content>
