<h2 class="f-w-500 m-b-24" mat-dialog-title>
  <strong>{{ action }} Statutory Config</strong>
</h2>

<mat-dialog-content style="min-width: 560px">
  <form #configForm="ngForm">
    <div class="row">

      <div class="col-lg-12">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Config Key</mat-label>
          <input
            type="text"
            matInput
            required
            name="configKey"
            [(ngModel)]="local_data.configKey"
            [disabled]="action === 'Update'"
          />
          @if (action === 'Update') {
            <mat-hint>Config key cannot be changed after creation.</mat-hint>
          }
        </mat-form-field>
      </div>

      <div class="col-lg-12">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Config Value</mat-label>
          <input
            type="text"
            matInput
            required
            name="configValue"
            [(ngModel)]="local_data.configValue"
          />
        </mat-form-field>
      </div>

      <div class="col-lg-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Effective From</mat-label>
          <input
            type="date"
            matInput
            required
            name="effectiveFrom"
            [(ngModel)]="local_data.effectiveFrom"
          />
        </mat-form-field>
      </div>

      <div class="col-lg-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Effective To (optional)</mat-label>
          <input
            type="date"
            matInput
            name="effectiveTo"
            [(ngModel)]="local_data.effectiveTo"
          />
          <mat-hint>Leave blank if this config has no end date.</mat-hint>
        </mat-form-field>
      </div>

    </div>

    <div class="d-flex gap-16 m-t-8">
      <button
        mat-flat-button
        color="primary"
        [disabled]="!configForm.valid"
        (click)="doAction()">
        {{ action }}
      </button>
      <button mat-stroked-button color="warn" (click)="closeDialog()">Cancel</button>
    </div>
  </form>
</mat-dialog-content>
