<h2 class="f-w-500 m-b-24" mat-dialog-title>
  <strong>{{ action }} PAYE Band</strong>
</h2>

<mat-dialog-content style="min-width: 560px">
  <form #bandForm="ngForm">
    <div class="row">

      <div class="col-lg-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Lower Bound</mat-label>
          <input
            type="number"
            matInput
            required
            min="0"
            name="lowerBound"
            [(ngModel)]="local_data.lowerBound"
          />
        </mat-form-field>
      </div>

      <div class="col-lg-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Higher Bound</mat-label>
          <input
            type="number"
            matInput
            required
            min="0"
            name="higherBound"
            [(ngModel)]="local_data.higherBound"
          />
        </mat-form-field>
      </div>

      <div class="col-lg-12">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Rate</mat-label>
          <input
            type="number"
            matInput
            required
            min="0"
            max="100"
            step="0.01"
            name="rate"
            [(ngModel)]="local_data.rate"
          />
          <span matTextSuffix>%</span>
          <mat-hint>Enter a value between 0 and 100.</mat-hint>
        </mat-form-field>
      </div>

      <div class="col-lg-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Effective From</mat-label>
          <input
            type="date"
            matInput
            required
            name="effectiveFrom"
            [(ngModel)]="local_data.effectiveFrom"
          />
        </mat-form-field>
      </div>

      <div class="col-lg-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Effective To (optional)</mat-label>
          <input
            type="date"
            matInput
            name="effectiveTo"
            [(ngModel)]="local_data.effectiveTo"
          />
          <mat-hint>Leave blank if this band has no end date.</mat-hint>
        </mat-form-field>
      </div>

    </div>

    <div class="d-flex gap-16 m-t-8">
      <button
        mat-flat-button
        color="primary"
        [disabled]="!bandForm.valid"
        (click)="doAction()">
        {{ action }}
      </button>
      <button mat-stroked-button color="warn" (click)="closeDialog()">Cancel</button>
    </div>
  </form>
</mat-dialog-content>
