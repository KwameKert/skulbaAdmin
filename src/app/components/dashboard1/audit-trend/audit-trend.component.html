<mat-card class="cardWithShadow">
  <mat-card-content class="p-24">
    <div class="d-flex align-items-center justify-content-between">
      <div>
        <span class="mat-subtitle-2 d-block">Total Audit Logs</span>
      </div>
      <div class="text-accent d-flex align-items-center gap-4">
        <i-tabler name="file-text" style="width: 40px; height: 40px;"></i-tabler>
      </div>
    </div>
    @if (lastMonth) {
    <div class="d-flex align-items-center gap-8 m-t-8">
      <span class="bg-light-primary text-primary f-s-12 f-w-500 p-x-8 p-y-2 rounded-pill">
        {{ lastMonth.month }}
      </span>
    </div>
    }
    @if (data && data.length > 0) {
    <div class="m-t-16">
      <apx-chart [series]="chartOptions.series" [chart]="chartOptions.chart" [stroke]="chartOptions.stroke"
        [fill]="chartOptions.fill" [markers]="chartOptions.markers" [tooltip]="chartOptions.tooltip">
      </apx-chart>
    </div>
    } @else {
    <div class="d-flex flex-column align-items-center justify-content-center m-t-24"
      style="color: #bbb; height: 130px;">
      <i-tabler name="chart-area" style="width: 36px; height: 36px;"></i-tabler>
      <span class="f-s-12 m-t-4">No audit data</span>
    </div>
    }
  </mat-card-content>
</mat-card>
